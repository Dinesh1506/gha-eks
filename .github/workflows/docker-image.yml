name: Kubernetes CI

on:
  push:
    branches:
      - main
jobs:
  pyapp-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v5
      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: "${{ secrets.DOCKER_USERNAME}}"
          password: "${{ secrets.DOCKER_PASSWORD1}}"
      - name: Build and Push docker image to Docker Hub  
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: "dinesh15061995/gha-pyapp:${{ env.SHORT_SHA }}"
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: dinesh15061995/gha-pyapp:${{ env.SHORT_SHA }}
          severity: CRITICAL,HIGH
          exit-code: 0
      - name: Build and Push docker image to Docker Hub  
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: "dinesh15061995/gha-pyapp:${{ env.SHORT_SHA }}"
         
      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Update Deployment.yaml with latest docker tag
        run: |
          # Short commit hash
          SHORT_SHA=${GITHUB_SHA::7}
          # Update image tag in deployment.yaml
          yq -i '.spec.template.spec.containers[0].image = "dinesh15061995/gha-pyapp:'"$SHORT_SHA"'"' ./k8s/pyapp-deployment.yml
      - name: Commit Deployment file changes
        run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions@noreply"
            git add k8s/pyapp-deployment.yml
            git commit -m 'docker tag updated by GHA' || echo "No changes to commit"
            git push origin main
            
